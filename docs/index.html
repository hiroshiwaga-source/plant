<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>メール確認が完了しました — plant</title>
    <style>
      :root {
        --canvas: #ebe6e0;
        --ink: #3a3633;
        --muted: #6f6862;
        --accent: #6f8f82;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: var(--canvas);
        color: var(--ink);
        line-height: 1.6;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        margin: 0 0 12px;
      }
      p {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
      }
      .mark {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>メール確認が完了しました</h1>
      <p>アプリに戻り、ログインしてください。</p>
    </main>
  </body>
</html>
